<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LinkedIn Profile Optimizer</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/favicon.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">


</head>

<body class="font-body auth-page">

    <div class="auth-toggles">
        <button type="button" id="theme-toggle" class="btn-icon" aria-label="Toggle theme">
            <i class="fas fa-moon dark-none"></i>
            <i class="fas fa-sun d-none dark-block"></i>
        </button>
        <button type="button" id="rtl-toggle" class="btn-icon" aria-label="Toggle RTL">
            <i class="fas fa-exchange-alt"></i>
        </button>
    </div>

    <div class="auth-card auth-card-login">
        <!-- Logo -->
        <div class="text-center mb-5">
            <a class="navbar-brand d-flex align-items-center justify-content-center gap-2" href="index.html">
                <div class="bg-primary p-2 rounded-3">
                    <i data-lucide="briefcase" class="w-5 h-5 text-white"></i>
                </div>
                <span
                    class="fw-bold font-heading text-secondary dark:text-white text-uppercase tracking-tight h6 mb-0">Optimizer</span>
            </a>
        </div>

        <h1 class="h3 fw-bold text-center mb-2 font-heading">Welcome Back</h1>
        <p class="text-muted text-center small mb-5">Sign in to manage your profile transformation.</p>

        <form class="d-grid gap-4">
            <div>
                <label class="form-label x-small fw-bold text-muted text-uppercase tracking-widest ms-1">Email
                    Address</label>
                <input type="email" class="form-control form-control-lg bg-light border-0 rounded-4 px-4 py-3"
                    placeholder="Email">
            </div>
            <div class="position-relative">
                <label
                    class="form-label x-small fw-bold text-muted text-uppercase tracking-widest ms-1">Password</label>
                <div class="position-relative">
                    <input type="password" class="form-control form-control-lg bg-light border-0 rounded-4 px-4 py-3"
                        placeholder="Password">
                    <button type="button"
                        class="btn btn-link position-absolute end-0 top-50 translate-middle-y text-muted px-4">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div
                class="d-flex flex-column flex-sm-row justify-content-between align-items-center align-items-sm-center gap-3 small fw-bold">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label text-muted" for="remember">Remember Me</label>
                </div>
                <a href="#" class="text-primary text-decoration-none">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary btn-lg rounded-pill py-3 fw-bold shadow-lg">Sign In</button>
        </form>

        <div class="mt-4 text-center">
            <p class="small text-muted mb-3">Or continue with</p>
            <div class="d-flex justify-content-center gap-3">
                <button class="btn btn-social">
                    <i class="fab fa-google text-danger"></i>
                </button>
                <button class="btn btn-social">
                    <i class="fab fa-facebook text-primary"></i>
                </button>
                <button class="btn btn-social">
                    <i class="fab fa-apple text-dark"></i>
                </button>
            </div>
        </div>

        <p class="text-center mt-5 small text-muted">
            Don't have an account? <a href="register.html" class="text-primary fw-bold text-decoration-none">Signup</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
