<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | LinkedIn Profile Optimizer</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="font-body text-center bg-white d-flex align-items-center justify-content-center min-vh-100">

    <div class="container py-5">
        <div class="mb-5 bg-primary-soft d-inline-flex p-4 rounded-5">
            <i data-lucide="settings" class="w-12 h-12 text-primary"></i>
        </div>
        
        <h1 class="display-4 fw-bold mb-4 font-heading">Updating Your Gateway</h1>
        <p class="lead text-muted max-w-md mx-auto mb-5">We're performing scheduled maintenance to improve your experience. We'll be back online soon.</p>
        
        <div class="spinner-grow text-primary mx-1" role="status"><span class="visually-hidden">Loading...</span></div>
        <div class="spinner-grow text-primary mx-1" role="status" style="animation-delay: 0.2s;"><span class="visually-hidden">Loading...</span></div>
        <div class="spinner-grow text-primary mx-1" role="status" style="animation-delay: 0.4s;"><span class="visually-hidden">Loading...</span></div>

        <div class="p-4 bg-light rounded-4 border mt-5 max-w-sm mx-auto">
            <small class="fw-bold text-muted text-uppercase tracking-widest">Status: Upgrade in Progress</small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
